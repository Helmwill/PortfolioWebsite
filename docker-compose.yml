---
# Portfolio — single static service behind the shared Traefik proxy.
#
# Traefik routing:
#   https://willmharris.dev/      → portfolio (nginx, port 8080)
#   https://www.willmharris.dev/  → same service
#   http://...                    → redirected to https (web entrypoint)
#
# This stack joins the SAME external `traefik-public` network the
# dashboard uses, so the existing Traefik instance discovers it.
# No second proxy, no second cert setup — Let's Encrypt issues a
# cert for willmharris.dev automatically via the letsencrypt resolver.
#
# Environment variables injected by the deploy workflow:
#   IMAGE_TAG      — commit SHA of the build to run (defaults to latest)
#   REGISTRY_URL   — container registry hostname

networks:
  traefik-public:
    external: true

services:

  portfolio:
    image: ${REGISTRY_URL}/portfolio:${IMAGE_TAG:-latest}
    container_name: portfolio
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # nginx writes to cache, pid, and tmp at runtime — provide tmpfs for each.
    # /var/cache/nginx needs mode 0177 so the non-root nginx user can create
    # temp subdirectories; the image chown is overwritten by the tmpfs mount.
    read_only: true
    tmpfs:
      - /var/run
      - /tmp
    volumes:
      - type: tmpfs
        target: /var/cache/nginx
        tmpfs:
          mode: 01777
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"

      # ---- HTTP → HTTPS redirect ----
      - "traefik.http.routers.portfolio-http.rule=Host(`willmharris.dev`) || Host(`www.willmharris.dev`)"
      - "traefik.http.routers.portfolio-http.entrypoints=web"
      - "traefik.http.routers.portfolio-http.middlewares=redirect-to-https"

      # ---- HTTPS router → portfolio ----
      - "traefik.http.routers.portfolio.rule=Host(`willmharris.dev`) || Host(`www.willmharris.dev`)"
      - "traefik.http.routers.portfolio.entrypoints=websecure"
      - "traefik.http.routers.portfolio.tls=true"
      - "traefik.http.routers.portfolio.tls.certresolver=letsencrypt"
      - "traefik.http.routers.portfolio.service=portfolio"
      - "traefik.http.services.portfolio.loadbalancer.server.port=8080"

      # ---- Redirect www → apex (optional canonical host) ----
      # Uncomment to force www.willmharris.dev → willmharris.dev
      # - "traefik.http.middlewares.www-redirect.redirectregex.regex=^https://www\\.willmharris\\.dev/(.*)"
      # - "traefik.http.middlewares.www-redirect.redirectregex.replacement=https://willmharris.dev/$${1}"
      # - "traefik.http.middlewares.www-redirect.redirectregex.permanent=true"
